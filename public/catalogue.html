<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweadup - Catalogue des formations</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/dashboard" class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>Tweadup</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="/dashboard"><i class="fas fa-home"></i> Accueil</a>
            <a href="/catalogue" class="active"><i class="fas fa-book"></i> Catalogue</a>
            <a href="/profile"><i class="fas fa-user"></i> Profil</a>
        </div>
        <div class="nav-user">
            <div class="user-menu" onclick="toggleUserMenu()">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="Avatar">
                <span id="userName">Utilisateur</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="dropdown-menu" id="userDropdown">
                <a href="/profile"><i class="fas fa-user"></i> Mon profil</a>
                <a href="/catalogue"><i class="fas fa-book"></i> Mes formations</a>
                <div class="dropdown-divider"></div>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Catalogue des formations</h1>
            <p>Découvrez nos formations et commencez votre apprentissage</p>
        </div>

        <div class="catalogue-filters">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher une formation...">
            </div>
            <div class="filter-tags" id="categoryFilters">
                <button class="filter-tag active" data-category="all">Toutes</button>
            </div>
        </div>

        <div class="formations-grid" id="formationsGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Chargement des formations...</p>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="/js/main.js"></script>
    <script src="/js/catalogue.js"></script>
</body>
</html>
